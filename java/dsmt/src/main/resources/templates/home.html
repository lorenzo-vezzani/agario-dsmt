<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGS — Erlang Game Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/general.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/home.css}" type="text/css" rel="stylesheet"/>
</head>
<body>

<div id="mouse-dot"></div>
<script th:src="@{/js/custom_pointer.js}" type="text/javascript"></script>

<div class="main-box">
    <div class="panel">
        <div class="logo">BallZ</div>
        <div class="subtitle">BallZone Battle Royale</div>

        <div class="section-label">🎮 Games</div>
        <a th:href="@{/create}" class="home-btn">▶ Create new game</a>
        <a th:href="@{/join}" class="home-btn">▶ Join existing game</a>

        <div class="section-label" style="margin-top:24px">📊 Statistics</div>
        <a th:href="@{/statistics}" class="home-btn">▶ View your stats</a>

        <div class="section-label" style="margin-top:24px">👤 Account</div>
        <form th:action="@{/logout}" method="post">
            <button class="home-btn home-btn--danger">✕ Logout</button>
        </form>
    </div>
</div>
</body>
</html>
