<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BallZone — Games list</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/general.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/games_list.css}" type="text/css" rel="stylesheet"/>
</head>
<body onload="startListUpdate()">

<div id="mouse-dot"></div>
<script th:src="@{/js/custom_pointer.js}" type="text/javascript"></script>
<script th:src="@{/js/games_list.js}" type="text/javascript"></script>

<div id="list-screen" class="main-box">
    <div class="panel">
        <div class="logo">BallZone</div>
        <div class="subtitle">BallZone Battle Royale</div>
        <a class="back-link" th:href="@{/home}">Back to Home</a>

        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>Game ID</th>
                        <th>Server</th>
                        <th>Players</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="server-list"></tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
