<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGS — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green:      #00ff88;
            --green-glow: rgba(0, 255, 136, 0.25);
            --red:        #ff2244;
            --red-glow:   rgba(255, 34, 68, 0.4);
            --bg:         #040c07;
            --panel-bg:   rgba(2, 18, 8, 0.95);
            --border:     rgba(0, 255, 136, 0.2);
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            cursor: none;
            overflow: hidden;
            background-image:
                    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        #mouse-dot {
            position: fixed;
            width: 13px; height: 13px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--red), 0 0 22px var(--red-glow);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            will-change: left, top;
        }

        #signup-screen {
            position: absolute; inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel {
            position: relative;
            border: 1px solid var(--border);
            background: var(--panel-bg);
            padding: 52px 60px 48px;
            width: min(460px, 90vw);
            box-shadow:
                    0 0 0 1px rgba(0,255,136,0.06),
                    0 0 50px var(--green-glow),
                    inset 0 1px 0 rgba(0,255,136,0.07);
        }

        .panel::after {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                    0deg, transparent, transparent 3px,
                    rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 1px solid rgba(0,255,136,0.08);
            pointer-events: none;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-align: center;
            color: var(--green);
            text-shadow: 0 0 20px var(--green), 0 0 60px var(--green-glow), 0 0 100px var(--green-glow);
            animation: flicker 8s infinite;
        }

        @keyframes flicker {
            0%, 95%, 97%, 99%, 100% { opacity: 1; }
            96%, 98% { opacity: 0.85; }
        }

        .subtitle {
            text-align: center;
            font-size: 0.62rem;
            letter-spacing: 0.38em;
            color: rgba(0,255,136,0.35);
            text-transform: uppercase;
            margin-top: 4px;
            margin-bottom: 40px;
        }

        .field + .field { margin-top: 18px; }

        .field-label {
            display: block;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: rgba(0,255,136,0.5);
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        .field-label .marker { color: var(--green); margin-right: 6px; }

        .field-input {
            width: 100%;
            background: rgba(0,255,136,0.03);
            border: 1px solid rgba(0,255,136,0.18);
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            caret-color: var(--green);
        }

        .field-input:focus {
            border-color: rgba(0,255,136,0.55);
            background: rgba(0,255,136,0.06);
            box-shadow: 0 0 14px var(--green-glow);
        }

        .field-input::placeholder { color: rgba(0,255,136,0.18); }

        .connect-btn {
            display: block;
            width: 100%;
            margin-top: 32px;
            padding: 14px 20px;
            background: transparent;
            border: 1px solid rgba(0,255,136,0.5);
            color: var(--green);
            font-family: 'Orbitron', monospace;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            cursor: none;
            transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
            position: relative;
            overflow: hidden;
        }

        .connect-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0,255,136,0.06), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .connect-btn:hover::before { transform: translateX(100%); }

        .connect-btn:hover {
            background: rgba(0,255,136,0.1);
            border-color: var(--green);
            box-shadow: 0 0 24px var(--green-glow);
        }

        .connect-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .error-box {
            margin-top: 16px;
            padding: 10px 14px;
            border: 1px solid rgba(255,34,68,0.35);
            background: rgba(255,34,68,0.06);
            color: #ff4466;
            font-size: 0.77rem;
            letter-spacing: 0.04em;
            line-height: 1.5;
            display: none;
        }

        .error-box.visible {
            display: block;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-link {
            margin-top: 18px;
            text-align: center;
        }

        .login-link a {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: rgba(0,255,136,0.45);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.15s, text-shadow 0.15s;
        }

        .login-link a:hover {
            color: var(--green);
            text-shadow: 0 0 10px var(--green-glow);
        }
    </style>
</head>
<body>

<div id="mouse-dot"></div>

<div id="signup-screen">
    <div class="panel">
        <div class="logo">EGS</div>
        <div class="subtitle">Crea un account</div>

        <form th:action="@{/auth/signup}" method="post">
            <div class="field">
                <label class="field-label" for="username"><span class="marker">▸</span>Username</label>
                <input class="field-input" type="text" id="username" name="username" placeholder="alice" autocomplete="off" required>
            </div>

            <div class="field">
                <label class="field-label" for="email"><span class="marker">▸</span>Email</label>
                <input class="field-input" type="email" id="email" name="email" placeholder="alice@email.com" autocomplete="off" required>
            </div>

            <div class="field">
                <label class="field-label" for="password"><span class="marker">▸</span>Password</label>
                <input class="field-input" type="password" id="password" name="password" placeholder="••••••" autocomplete="off" required>
            </div>

            <div class="field">
                <label class="field-label" for="confirmPassword"><span class="marker">▸</span>Conferma Password</label>
                <input class="field-input" type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••" autocomplete="off" required>
            </div>

            <button class="connect-btn" type="submit">▶ Sign Up</button>
        </form>

        <div class="error-box" th:classappend="${error} ? ' visible'" th:text="${error} ? ${error} : ''"></div>

        <div class="login-link">
            <a th:href="@{/login}">Already registered? Login</a>
        </div>
    </div>
</div>

<script>
    "use strict";
    const $mouseDot = document.getElementById('mouse-dot');
    document.addEventListener('mousemove', e => {
        $mouseDot.style.left = e.clientX + 'px';
        $mouseDot.style.top  = e.clientY + 'px';
    });
</script>
</body>
</html>
