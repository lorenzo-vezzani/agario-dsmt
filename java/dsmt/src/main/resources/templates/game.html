<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGS — Erlang Game Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/general.css}" type="text/css" rel="stylesheet"/>
    <link th:href="@{/css/game_zoom.css}" type="text/css" rel="stylesheet"/>

    <script th:inline="javascript">
        const INIT_HOST_IP = [[${hostIp}]];
        const INIT_HOST_PORT = [[${hostPort}]];
        const INIT_GAME_ID = [[${gameId}]];
        const INIT_PLAYER_ID = [[${playerId}]];
    </script>
</head>
<body>

<!-- Always-visible mouse dot -->
<div id="mouse-dot"></div>

<!-- ═══ LOGIN SCREEN ════════════════════════════════════ -->
<div id="login-screen" class="main-box">
    <div class="panel">
        <div class="field">
            <label class="field-label">
                <span class="marker">▸</span>
                <span id="host-address">host:ip</span>
            </label>
        </div>
        <div class="field">
            <label class="field-label">
                <span class="marker">▸</span>
                <span id="game-id">game Id</span>
            </label>
        </div>

        <button class="connect-btn" id="enter-btn">▶ Enter</button>
        <button class="connect-btn" id="join-back-btn">▶ Join back</button>

        <div class="page-link">
            <a th:href="@{/lobby}">Back to lobby</a>
        </div>
        <div class="page-link">
            <a th:href="@{/statistics}">Check your stats</a>
        </div>

        <div class="error-box" id="error-box"></div>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">✕ Logout</button>
        </form>
    </div>
</div>

<!-- ═══ GAME SCREEN ═════════════════════════════════════ -->
<div id="game-screen" class="main-box">
    <div class="hud" id="hud">
        <div class="hud-info">
            GAME <b id="hud-game">—</b> &nbsp;·&nbsp; PLAYER <b id="hud-player">—</b>
        </div>
        <div id="hud-zoom">ZOOM <b id="hud-zoom-val">1.0×</b> &nbsp;<span style="color:rgba(0,255,136,0.3);font-size:0.58rem">Q- P+</span></div>
        <div class="hud-players">PLAYERS: <b id="hud-count">0</b></div>
        <button class="quit-btn" id="quit-btn">✕ Quit</button>
    </div>
    <canvas id="arena-canvas"></canvas>
</div>
<script th:src="@{js/game.js}"></script>
</body>
</html>
